<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Sistema Inteligente de Predicción de Demanda</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

/* FONDO */

body{

margin:0;
font-family:'Segoe UI';
color:white;
overflow-x:hidden;
background:#0f2027;

}

/* PARTICULAS */

#particles-js{

position:fixed;
width:100%;
height:100%;
z-index:-1;

}

/* SPLASH SCREEN */

#splash{

position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
z-index:9999;
animation:fadeOut 1s ease forwards;
animation-delay:3s;

}

#splash i{

font-size:80px;
margin-bottom:20px;
animation:pulse 2s infinite;

}

#splash h1{

font-size:36px;
font-weight:700;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}

}

@keyframes fadeOut{

to{

opacity:0;
visibility:hidden;

}

}

/* CONTENIDO */

#main-content{

opacity:0;
animation:fadeIn 1s ease forwards;
animation-delay:3s;

}

@keyframes fadeIn{

to{

opacity:1;

}

}

/* TITULO */

.titulo{

font-size:46px;
font-weight:700;

}

/* TARJETAS */

.card{

border-radius:20px;
background:white;
color:black;
box-shadow:0 20px 40px rgba(0,0,0,0.35);
transition:0.3s;

}

.card:hover{

transform:translateY(-6px);
box-shadow:0 30px 60px rgba(0,0,0,0.4);

}

/* BOTON */

.btn-predict{

background:linear-gradient(45deg,#007BFF,#00c6ff);
border:none;
font-size:18px;
padding:14px;
border-radius:12px;
color:white;
font-weight:600;
transition:0.3s;

}

.btn-predict:hover{

transform:scale(1.05);

}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- SPLASH SCREEN -->

<div id="splash">

<i class="fa-solid fa-brain"></i>

<h1>Sistema de Inteligencia Artificial</h1>

<p>Inicializando analítica predictiva...</p>

</div>

<!-- CONTENIDO PRINCIPAL -->

<div id="main-content">

<div class="container py-5">

<div class="text-center mb-5">

<h1 class="titulo">

<i class="fa-solid fa-brain"></i>

Sistema de Predicción de Demanda

</h1>

<p class="lead">

Analítica inteligente para optimización de inventarios

</p>

</div>

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card p-4">

<h4 class="mb-4">

<i class="fa-solid fa-box"></i>

Configuración de Predicción

</h4>

<form action="/dashboard" method="POST">

<div class="mb-3">

<label>Producto</label>

<select class="form-control" name="product" required>

<option value="">Selecciona producto</option>

<option>Laptop</option>
<option>Mouse</option>
<option>Teclado</option>
<option>Monitor</option>
<option>Audifonos</option>

</select>

</div>

<div class="mb-3">

<label>Categoría</label>

<select class="form-control" name="category" required>

<option>Electronica</option>
<option>Accesorios</option>

</select>

</div>

<div class="row mb-3">

<div class="col">

<label>Región</label>

<select class="form-control" name="region">

<option>Norte</option>
<option>Centro</option>
<option>Sur</option>

</select>

</div>

<div class="col">

<label>Tienda</label>

<select class="form-control" name="store">

<option>Tienda 1</option>
<option>Tienda 2</option>
<option>Tienda 3</option>
<option>Tienda 4</option>

</select>

</div>

</div>

<div class="row mb-3">

<div class="col">

<label>Precio</label>

<input class="form-control" type="number" step="0.01" name="price" required>

</div>

<div class="col">

<label>Promoción</label>

<select class="form-control" name="promotion">

<option value="0">No</option>
<option value="1">Sí</option>

</select>

</div>

</div>

<div class="mb-3">

<label>Inventario actual</label>

<input class="form-control" type="number" name="inventory" required>

</div>

<button class="btn btn-predict w-100">

<i class="fa-solid fa-chart-line"></i>

 Generar Predicción

</button>

</form>

</div>

</div>

</div>

</div>

</div>

<script>

/* PARTICULAS */

particlesJS("particles-js", {

"particles":{

"number":{"value":70},

"size":{"value":3},

"move":{"speed":2},

"line_linked":{

"enable":true,
"distance":150

}

}

});

</script>

</body>

</html>
